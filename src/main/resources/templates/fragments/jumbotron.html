<div th:fragment="jumbotron" class="container-fluid py-5">

  <div class="row">
    <div class="col-md-1 mx-0 px-1 my-0 py-1">
      <img th:src="@{/images/logo.png}" class="rounded my-0 py-0" height="92"></img>
    </div>
    <div class="col-md-10 mx-0 px-5 my-0 py-3">
      <h3 th:text="#{jumbotron.title}"></h3>
      <span th:text="#{jumbotron.description}"></span>
    </div>
  </div>

  <form th:action="@{/search (lang=${param.lang})}" th:object="${jobVacancySearch}" method="get" class="form-inline">
    <div class="row">

      <div class="col-md-5 mx-0 px-1">
        <input type="text" th:field="*{description}" class="form-control mb-3" th:placeholder="#{jumbotron.searchField}" style="height:40px"></input>
      </div>

      <div class="col-md-5 mx-0 px-1">
        <select th:field="*{jobCategory.id}" class="form-select mb-3" style="height:40px">
          <option th:value="null" th:text="#{jumbotron.selectCategoryField}" selected></option>
          <option th:each="jobCategory : ${jobCategories}" th:text="${jobCategory.name}" th:value="${jobCategory.id}"></option>
        </select>
      </div>

      <div class="col-md-2 mx-0 px-1">
        <button type="submit" class="btn btn-primary mb-3" th:text="#{button.search}" style="height:40px"></button>
      </div>

    </div>
  </form>

</div>
