<!doctype html>
<html layout:decorate="~{fragments/template}">
  <head>
    <title th:text="#{jobCategoryDetail.head.title}"></title>
  </head>

  <body>

    <div layout:fragment="mainContent">
      <div class="card">
        <h4 class="card-header"><strong th:text="#{jobCategoryDetail.main.title}"></strong></h4>
        <div class="card-body">

          <h5 class="card-title"><strong th:text="#{jobCategory.name} + ': '"></strong> <span th:text="${jobCategory.name}"></span></h5>
		  <div class="row">
            <div class="col-md-6">
              <h6 class="card-title"><strong th:text="#{jobCategory.description} + ': '"></strong> <span th:text="${jobCategory.description}"></span></h6>

              <h6 class="card-title"><strong th:text="#{abstractEntity.firstRegistrationDateTime} + ': '"></strong><span th:text="${dateTimeUtils.convertToStringForWebPageField(jobCategory.firstRegistrationDateTime)}"></span></h6>
              <h6 class="card-title" th:with="firstRegistrationAuthUserId=${jobCategory.getFirstRegistrationAuthUserId()}">
                <strong th:text="#{abstractEntity.firstRegistrationAuthUserEmail} + ': '"></strong>
                <a th:if="${firstRegistrationAuthUserId} != null" th:href="@{/auth-users/view/{id} (id=${firstRegistrationAuthUserId}, lang=${param.lang})}" th:text="${jobCategory.getFirstRegistrationAuthUserEmail('-')}"></a>
                <span th:if="${firstRegistrationAuthUserId} == null" th:text="'-'"></span>
              </h6>

              <h6 class="card-title"><strong th:text="#{abstractEntity.lastModificationDateTime} + ': '"></strong><span th:text="${dateTimeUtils.convertToStringForWebPageField(jobCategory.lastModificationDateTime)}"></span></h6>
              <h6 class="card-title" th:with="lastModificationAuthUserId=${jobCategory.getLastModificationAuthUserId()}">
                <strong th:text="#{abstractEntity.lastModificationAuthUserEmail} + ': '"></strong>
                <a th:if="${lastModificationAuthUserId} != null" th:href="@{/auth-users/view/{id} (id=${lastModificationAuthUserId}, lang=${param.lang})}" th:text="${jobCategory.getLastModificationAuthUserEmail('-')}"></a>
                <span th:if="${lastModificationAuthUserId} == null" th:text="'-'"></span>
              </h6>

            </div>
          </div>

        </div>
      </div>

    </div>

  </body>
</html>
