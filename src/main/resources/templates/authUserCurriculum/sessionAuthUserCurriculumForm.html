<!doctype html>
<html layout:decorate="~{fragments/template}">
  <head>
    <title th:text="(${authUserCurriculum.id} == null) ? #{authUserCurriculumCreation.head.title} : #{authUserCurriculumEdition.head.title}"></title>
  </head>

  <body>

    <div layout:fragment="mainContent">
      <div class="card">
        <h4 class="card-header"><strong th:text="(${authUserCurriculum.id} == null) ? #{authUserCurriculumCreation.main.title} : #{authUserCurriculumEdition.main.title}"></strong></h4>
        <div class="card-body">

          <form th:action="@{/my-user/auth-user-curriculums/save (lang=${param.lang})}" th:object="${authUserCurriculum}" method="post" enctype="multipart/form-data">
            <div class="row">
              <div class="col-md-6">
                <div class="form-group">
                  <input type="hidden" th:field="*{id}"></input>
                  <input type="hidden" th:field="*{firstRegistrationDateTime}"></input>
                  <input type="hidden" th:field="*{firstRegistrationAuthUser}"></input>
                  <label for="description" class="form-label mt-2 mb-1" th:text="#{authUserCurriculum.description} + ': '"></label>
                  <textarea class="form-control" name="description" th:field="*{description}" id="description" rows="2"></textarea>
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-group">
                  <label for="curriculumFile" class="form-label mt-2 mb-1" th:text="#{authUserCurriculum.fileName} + ': '"></label>
                  <input type="file" class="form-control-file" name="curriculumFile" id="curriculumFile" required="true"></input>
                  <p class="help-block" th:text="#{uploadFile.allowedExtensions} + ': ' + ${T(com.aliuken.jobvacanciesapp.model.dto.FileType).CURRICULUM.allowedExtensions}"></p>
                </div>
              </div>
            </div>
            <hr/>
            <button type="submit" class="btn btn-primary" th:text="#{button.send}"></button>
          </form>

        </div>
      </div>
    </div>

  </body>
</html>
